<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/blank"></ion-back-button>
    </ion-buttons>
    <ion-title>Lista de Contactos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let contacto of contactos">
      <ion-avatar slot="start">
        <ion-icon name="person-circle" style="font-size: 40px; color: #3880ff;"></ion-icon>
      </ion-avatar>
      <ion-label>
        <h2>{{ contacto.nombre }}</h2>
        <p>{{ contacto.telefono }}</p>
        <p>{{ contacto.email }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
