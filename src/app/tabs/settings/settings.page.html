<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Ajustes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>

    <ion-list-header>
      <ion-label>Preferencias</ion-label>
    </ion-list-header>

    <ion-item>
      <ion-icon name="notifications" slot="start"></ion-icon>
      <ion-label>Notificaciones</ion-label>
      <ion-toggle
        slot="end"
        [checked]="notificaciones"
        (ionChange)="toggleNotificaciones()">
      </ion-toggle>
    </ion-item>

    <ion-item>
      <ion-icon name="moon" slot="start"></ion-icon>
      <ion-label>Modo Oscuro</ion-label>
      <ion-toggle
        slot="end"
        [checked]="modoOscuro"
        (ionChange)="toggleModoOscuro()">
      </ion-toggle>
    </ion-item>

    <ion-list-header>
      <ion-label>Información</ion-label>
    </ion-list-header>

    <ion-item>
      <ion-icon name="information-circle" slot="start"></ion-icon>
      <ion-label>Versión de la App</ion-label>
      <ion-note slot="end">1.0.0</ion-note>
    </ion-item>

  </ion-list>

</ion-content>
